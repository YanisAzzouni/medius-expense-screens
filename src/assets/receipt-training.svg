<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <!-- Paper -->
  <rect width="196" height="272" rx="4" fill="#fffefa"/>
  <rect x="196" y="4" width="3" height="268" rx="2" fill="#00000008"/>

  <!-- Header (purple) -->
  <rect width="196" height="54" rx="4" fill="#6d28d9"/>
  <rect y="30" width="196" height="24" fill="#6d28d9"/>
  <!-- Logo area (play button triangle) -->
  <circle cx="32" cy="27" r="13" fill="white" opacity="0.2"/>
  <polygon points="28,21 28,33 40,27" fill="white" opacity="0.7"/>
  <!-- Merchant name -->
  <rect x="52" y="17" width="76" height="8" rx="4" fill="white" opacity="0.95"/>
  <!-- Sub-label -->
  <rect x="60" y="30" width="60" height="5" rx="2.5" fill="white" opacity="0.55"/>
  <!-- Invoice number -->
  <rect x="58" y="40" width="80" height="4" rx="2" fill="white" opacity="0.4"/>
  <!-- Date -->
  <rect x="70" y="48" width="56" height="4" rx="2" fill="white" opacity="0.35"/>

  <!-- Separator -->
  <line x1="16" y1="67" x2="180" y2="67" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Purchaser -->
  <rect x="16" y="75" width="56" height="5" rx="2.5" fill="#9ca3af"/>
  <rect x="78" y="75" width="88" height="5" rx="2.5" fill="#d1d5db"/>

  <!-- Separator -->
  <line x1="16" y1="89" x2="180" y2="89" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Items -->
  <rect x="16" y="101" width="116" height="6" rx="3" fill="#374151"/>
  <rect x="154" y="101" width="26" height="6" rx="3" fill="#374151"/>

  <rect x="16" y="115" width="76" height="6" rx="3" fill="#374151"/>
  <rect x="154" y="115" width="26" height="6" rx="3" fill="#374151"/>

  <rect x="16" y="129" width="90" height="6" rx="3" fill="#374151"/>
  <rect x="154" y="129" width="26" height="6" rx="3" fill="#374151"/>

  <!-- Access duration badge -->
  <rect x="16" y="143" width="72" height="6" rx="3" fill="#374151"/>
  <rect x="94" y="143" width="36" height="6" rx="3" fill="#ede9fe"/>
  <rect x="154" y="143" width="26" height="6" rx="3" fill="#374151"/>

  <!-- Separator -->
  <line x1="16" y1="158" x2="180" y2="158" stroke="#e5e7eb" stroke-width="1"/>

