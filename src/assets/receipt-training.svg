  <rect x="124" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="128" y="238" width="3" height="12" fill="#1f2937"/>
  <rect x="133" y="238" width="4" height="12" fill="#1f2937"/>
  <rect x="139" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="143" y="238" width="3" height="12" fill="#1f2937"/>
  <rect x="148" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="152" y="238" width="4" height="12" fill="#1f2937"/>
