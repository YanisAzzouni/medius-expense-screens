  <rect x="16" y="202" width="36" height="8" rx="4" fill="#111827"/>
  <rect x="136" y="202" width="44" height="8" rx="4" fill="#6d28d9"/>

  <!-- Payment -->
  <rect x="16" y="220" width="122" height="5" rx="2.5" fill="#d1d5db"/>

  <!-- Barcode -->
  <rect x="28" y="236" width="140" height="16" rx="2" fill="#f3f4f6"/>
  <rect x="34" y="238" width="4" height="12" fill="#1f2937"/>
  <rect x="40" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="44" y="238" width="3" height="12" fill="#1f2937"/>
