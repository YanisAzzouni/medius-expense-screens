  <rect x="82" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="86" y="238" width="3" height="12" fill="#1f2937"/>
  <rect x="91" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="95" y="238" width="4" height="12" fill="#1f2937"/>
  <rect x="101" y="238" width="2" height="12" fill="#1f2937"/>
  <rect x="105" y="238" width="3" height="12" fill="#1f2937"/>
  <rect x="110" y="238" width="2" height="12" fill="#1f2937"/>
